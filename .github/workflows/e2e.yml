name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  doubles-4v4:
    name: Standard Doubles 4/4 regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Test-account credentials — configure these as repo/organization
      # secrets. If any are missing the spec self-skips (see
      # tests/e2e/doubles-4v4.spec.ts), so PRs from forks without secret
      # access won't fail the job.
      E2E_HOST_EMAIL: ${{ secrets.E2E_HOST_EMAIL }}
      E2E_HOST_PASSWORD: ${{ secrets.E2E_HOST_PASSWORD }}
      E2E_P1_EMAIL: ${{ secrets.E2E_P1_EMAIL }}
      E2E_P1_PASSWORD: ${{ secrets.E2E_P1_PASSWORD }}
      E2E_P2_EMAIL: ${{ secrets.E2E_P2_EMAIL }}
      E2E_P2_PASSWORD: ${{ secrets.E2E_P2_PASSWORD }}
      E2E_P3_EMAIL: ${{ secrets.E2E_P3_EMAIL }}
      E2E_P3_PASSWORD: ${{ secrets.E2E_P3_PASSWORD }}
      E2E_OUTSIDER_EMAIL: ${{ secrets.E2E_OUTSIDER_EMAIL }}
      E2E_OUTSIDER_PASSWORD: ${{ secrets.E2E_OUTSIDER_PASSWORD }}
      # For trusted runs (pushes and same-repo PRs) require the secrets to
      # be present so a misconfigured environment fails loudly instead of
      # silently self-skipping. Fork PRs don't have access to secrets, so
      # they continue to self-skip.
      E2E_REQUIRE_SECRETS: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'true' || 'false' }}
      E2E_COURT_LABEL: CI Doubles Regression
      E2E_BASE_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb', 'package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Preflight — verify Chromium is installed
        run: |
          set -e
          CHROME=$(find ~/.cache/ms-playwright -maxdepth 2 -type f -path '*/chromium-*/chrome-linux/chrome' | head -n 1)
          if [ -z "$CHROME" ]; then
            echo "❌ Playwright Chromium is not installed."
            echo "   Run 'bunx playwright install --with-deps chromium' locally (or in CI)."
            exit 1
          fi
          echo "✅ Chromium found: $CHROME"

      - name: Start dev server
        run: |
          bun run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "dev server ready"
              exit 0
            fi
            sleep 1
          done
          echo "dev server failed to start"
          tail -n 200 /tmp/dev-server.log
          exit 1

      - name: Run Playwright regression
        run: bunx playwright test tests/e2e/doubles-4v4.spec.ts --reporter=list,html

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill "$(cat /tmp/dev-server.pid)" || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload dev server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: /tmp/dev-server.log
          retention-days: 7
